{% extends 'base.html' %}

{% block title %}Login{% endblock title %}

{% block body %}
<div class="d-flex justify-content-center align-items-center vh-100">
    <form class="p-4 border rounded shadow w-50" action="" method="POST">
        <h3 class="text-center">Login</h3>
        <div class="mb-3">
            <div class="row mb-3 align-items-center">
                <div class="col">
                    <label for="username" class="col-form-label text-sm-end">Username:</label>
                </div>
                <div class="col-sm-9">
                    <input type="text" name="username" id="username" class="form-control {{ 'is-invalid' if errors }}" value="{{data.username}}" placeholder="user_1" required>
                    <div class="invalid-feedback">
                        {{ errors.message }}
                    </div>
                </div>
            </div>

            <div class="row mb-3 align-items-center">
                <div class="col">
                    <label for="password" class="col-form-label text-sm-end">Password:</label>
                </div>
                <div class="col-sm-9">
                    <input type="password" name="password" id="password" class="form-control {{ 'is-invalid' if errors }}" placeholder="password_1"
                        required>
                    <div class="invalid-feedback">
                        invalid input
                    </div>
                </div>
            </div>
        </div>
        <button type="submit" class="btn btn-primary w-100">Login</button>
    </form>
</div>
{% endblock body %}
