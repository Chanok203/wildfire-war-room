{% extends 'base.html' %}

{% block title %}Mission View{% endblock title %}

{% block style %}
<link rel="stylesheet" href="/public/vendor/maplibre-gl/css/maplibre-gl.css">
<style>
    #map {
        width: 100%;
        height: 100%;
        min-height: 600px;
        z-index: 1;
    }
</style>
{% endblock style %}

{% block body %}
<div class="container-fluid py-2 mt-3">
    <h5 class="mb-0">Mission Name: {{mission.name}}</h5>
    <small class="text-muted">Mission Id: {{mission.id}}</small>
    <form action="/mission/{{mission.id}}/delete" method="post">
        <button class="btn btn-outline-danger">
            Delete
        </button>
    </form>
</div>

<div class="container-fluid flex-grow-1 mt-3">
    <div class="row h-100 g-0">
        <div class="col-md-8 p-0 bg-dark d-flex align-items-center justify-content-center">

            <div class="position-relative w-100 h-100 bg-dark">
                <div id="map"></div>
            </div>

        </div>
        <div class="col-md-4 d-flex justify-content-center bg-light p-3">
            <form action="#" class="w-100" id="dataForm">
                <h3 class="mb-4 text-center">Hotspots</h3>
                <div class="row align-items-center">
                    <div class="col">
                        <label>Lead Time:</label>
                    </div>
                    <div class="col-sm-9">
                        <select id="type-select" class="selectpicker form-control" multiple data-actions-box="true"
                            data-selected-text-format="count > 3" data-container="body" title="Select ...">
                            <option value="PRED_30" selected>30 Minutes</option>
                            <option value="PRED_45">45 Minutes</option>
                            <option value="PRED_60">60 Minutes</option>
                        </select>
                    </div>
                </div>

                <div class="row align-items-center">
                    <div class="col">
                        <label>Patrol Route:</label>
                    </div>
                    <div class="col-sm-9">
                        <select id="patrol-select" class="selectpicker form-control" multiple data-actions-box="true"
                            data-selected-text-format="count > 3" data-container="body" title="Select ...">
                            <option value="patrol_walking_67_68" selected>Walking</option>
                            <option value="patrol_motorcycle_67_68">Motorcycle</option>
                            <option value="patrol_car_67_68">Car</option>
                        </select>
                    </div>
                </div>

                <hr>
                <h3 class="my-4 text-center">Meta Data</h3>
                <!-- droneName -->
                <div class="row mb-3 align-items-center">
                    <div class="col">
                        <label for="droneName" class="col-form-label text-sm-end">drone_name:</label>
                    </div>
                    <div class="col-sm-9">
                        <input type="text" class="form-control" value="{{mission.inputData.droneName}}" disabled>
                    </div>
                </div>

                <!-- missionName -->
                <div class="row mb-3 align-items-center">
                    <div class="col">
                        <label for="missionName" class="col-form-label text-sm-end">mission_name:</label>
                    </div>
                    <div class="col-sm-9">
                        <input type="text" name="missionName" id="missionName" class="form-control"
                            value="{{mission.inputData.missionName}}" placeholder="mission_01" disabled>
                    </div>
                </div>

                <!-- latitude -->
                <div class="row mb-3 align-items-center">
                    <div class="col">
                        <label for="latitude" class="col-form-label text-sm-end">latitude:</label>
                    </div>
                    <div class="col-sm-9">
                        <input type="number" step="0.000001" name="latitude" id="latitude" class="form-control"
                            placeholder="18.684905" value="{{mission.inputData.latitude}}" disabled>
                    </div>
                </div>

                <!-- longitude -->
                <div class="row mb-3 align-items-center">
                    <div class="col">
                        <label for="longitude" class="col-form-label text-sm-end">longitude:</label>
                    </div>
                    <div class="col-sm-9">
                        <input type="number" step="0.000001" name="longitude" id="longitude" class="form-control"
                            placeholder="100.213579" value="{{mission.inputData.longitude}}" disabled>
                    </div>
                </div>

                <!-- wind_speed -->
                <div class="row mb-3 align-items-center">
                    <div class="col">
                        <label for="windSpeed" class="col-form-label text-sm-end">Wind Speed (m/s):</label>
                    </div>
                    <div class="col-sm-9">
                        <input type="number" step="0.01" name="windSpeed" id="windSpeed" class="form-control"
                            placeholder="0.00" value="{{mission.inputData.windSpeed}}" disabled>
                    </div>
                </div>

                <!-- Wind Direction -->
                <div class="row mb-3 align-items-center">
                    <div class="col">
                        <label for="windDirection" class="col-form-label text-sm-end">Wind Direction (°):</label>
                    </div>
                    <div class="col-sm-9">
                        <input type="number" name="windDirection" id="windDirection" min="0" max="359" placeholder="0"
                            value="{{mission.inputData.windDirection}}" disabled>
                    </div>
                </div>

            </form>
        </div>
    </div>
</div>
{% endblock body %}

{% block script %}
<script>
    window.APP_CONFIG = {
        qgisUrl: "{{ qgisUrl }}",
    }
</script>
<script src="/public/vendor/maplibre-gl/js/maplibre-gl.js"></script>
<script src="/public/js/mission-view.js"></script>
{% endblock script %}
